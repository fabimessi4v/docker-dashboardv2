version: '3.8'

services:
  docker-dashboard:
    build: .
    container_name: docker-dashboard-v2
    restart: always
    ports:
      - "8060:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FLASK_ENV=production
